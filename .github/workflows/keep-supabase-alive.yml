name: Keep Supabase Alive

on:
  schedule:
    # 毎日0:00(UTC) = 9:00(JST)に実行
    - cron: '0 0 * * *'
    # 毎日12:00(UTC) = 21:00(JST)に実行
    - cron: '0 12 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Pinging Supabase database..."
          psql "$DATABASE_URL" -c "SELECT 1;" && echo "Success: Database is alive" || echo "Failed to connect"
